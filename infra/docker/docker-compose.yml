services:
  rabbitmq:
    image: rabbitmq:3.13-management
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: repolens
      RABBITMQ_DEFAULT_PASS: repolens2411
    ports:
      - '5672:5672'
      - '15672:15672'
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 5s
      timeout: 5s
      retries: 20

  intake-service:
    build:
      context: ../..
      dockerfile: apps/intake-service/Dockerfile
    environment:
      PORT: '3001'
      MONGODB_URI: ${MONGODB_URI:-mongodb://host.docker.internal:27017/repoLens}
      RABBITMQ_URL: amqp://repolens:repolens2411@rabbitmq:5672
      LOG_LEVEL: info
      START_RETRY_DELAY_MS: '5000'
    restart: unless-stopped
    ports:
      - '3001:3001'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      rabbitmq:
        condition: service_healthy

  repo-fetcher-service:
    build:
      context: ../..
      dockerfile: apps/repo-fetcher-service/Dockerfile
    environment:
      MONGODB_URI: ${MONGODB_URI:-mongodb://host.docker.internal:27017/repoLens}
      RABBITMQ_URL: amqp://repolens:repolens2411@rabbitmq:5672
      WORKSPACES_ROOT: /workspaces
      ZIP_SIZE_LIMIT_MB: '200'
      ZIP_FILE_COUNT_LIMIT: '50000'
      DOWNLOAD_TIMEOUT_MS: '300000'
      EXTRACT_TIMEOUT_MS: '300000'
      LOG_LEVEL: info
      START_RETRY_DELAY_MS: '5000'
    restart: unless-stopped
    volumes:
      - workspaces-data:/workspaces
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      rabbitmq:
        condition: service_healthy

  vibe-review-service:
    build:
      context: ../..
      dockerfile: apps/vibe-review-service/Dockerfile
    environment:
      MONGODB_URI: ${MONGODB_URI:-mongodb://host.docker.internal:27017/repoLens}
      RABBITMQ_URL: amqp://repolens:repolens2411@rabbitmq:5672
      WORKSPACES_ROOT: /workspaces
      REVIEW_TIMEOUT_MS: '600000'
      REVIEW_USE_CODEX: ${REVIEW_USE_CODEX:-true}
      REVIEW_MODEL: ${REVIEW_MODEL:-codex-mini-latest}
      REVIEW_MAX_CONTEXT_CHARS: ${REVIEW_MAX_CONTEXT_CHARS:-180000}
      REVIEW_MAX_FILE_CHARS: ${REVIEW_MAX_FILE_CHARS:-4000}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LOG_LEVEL: info
      START_RETRY_DELAY_MS: '5000'
    restart: unless-stopped
    volumes:
      - workspaces-data:/workspaces
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      rabbitmq:
        condition: service_healthy

  web-client:
    build:
      context: ../..
      dockerfile: apps/web-client/Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:3001
    restart: unless-stopped
    ports:
      - '5174:5173'
    depends_on:
      intake-service:
        condition: service_started

volumes:
  workspaces-data:
