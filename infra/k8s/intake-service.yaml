apiVersion: apps/v1
kind: Deployment
metadata:
  name: intake-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: intake-service
  template:
    metadata:
      labels:
        app: intake-service
    spec:
      containers:
        - name: intake-service
          image: repolens/intake-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: '3001'
          envFrom:
            - configMapRef:
                name: repolens-config
---
apiVersion: v1
kind: Service
metadata:
  name: intake-service
spec:
  selector:
    app: intake-service
  ports:
    - port: 3001
      targetPort: 3001
